name: Nomad Build APK

on:
  workflow_dispatch: # To pozwala Ci odpalić to ręcznie z przycisku na Pixelu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Android zazwyczaj lubi 17-tkę

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Drop
        uses: actions/upload-artifact@v4
        with:
          name: Thunderbolt-Nomad-APK
          path: app/build/outputs/apk/debug/*.apk
